# DEPRECATED: This phase-specific config is kept for historical reference and is no longer actively used.
model:
  path: yolo26n.pt

data:
  data_yaml: configs/coco_subset500.yaml
  image_dir: coco/val2017_subset500/images

runner:
  confs: [0.25]
  iou: 0.7
  imgsz: 640
  seed: 42
  output_root: outputs
  metrics_csv: metrics_summary.csv

experiments:
  - name: baseline_pgd_eot
    attack: none
    defense: none
    run_name_template: baseline-pgd-eot-confidence{conf_token}
    run_validation: true

  - name: pgd_budget_016_steps20
    attack: pgd
    attack_params:
      epsilon: 0.016
      alpha: 0.002
      steps: 20
      random_start: true
      restarts: 1
    defense: none
    run_name_template: pgd-budget-016-steps20-confidence{conf_token}
    run_validation: true

  - name: eot_pgd_budget_016_steps20
    attack: eot_pgd
    attack_params:
      epsilon: 0.016
      alpha: 0.0015
      steps: 20
      random_start: true
      restarts: 1
      eot_samples: 4
      scale_jitter: 0.1
      translate_frac: 0.03
      brightness_jitter: 0.08
      contrast_jitter: 0.08
      blur_prob: 0.25
    defense: none
    run_name_template: eot-pgd-budget-016-steps20-confidence{conf_token}
    run_validation: true
