profiles:
  yolo11n_lab_v1:
    description: Canonical YOLO11n lab profile for the one real pipeline v1.
    model:
      name: yolo
      params:
        model: yolo11n.pt
    data:
      source_dir: coco/val2017_subset500/images
    predict:
      conf: 0.5
      iou: 0.7
      imgsz: 640
    validation:
      enabled: false
      dataset: configs/coco_subset500.yaml
      params: {}
    summary:
      enabled: false
    runner:
      seed: 42
      max_images: 8
      output_root: outputs/framework_runs
    attacks:
      canonical:
        - fgsm
        - pgd
        - deepfool
        - eot_pgd
        - dispersion_reduction
        - blur
        - square
      manual_only:
        - cw
        - fgsm_center_mask
        - fgsm_edge_mask
        - jpeg_attack
        - pretrained_patch
    defenses:
      canonical:
        - bit_depth
        - jpeg_preprocess
        - median_preprocess
      manual_only:
        - c_dog
        - c_dog_ensemble
        - confidence_filter
        - random_resize
    authoritative_metric: mAP50
    fortify_mode:
      name: cycle_rank_tune_validate
      description: Attack/defense ranking, parameter tuning, and authoritative validation stay inside auto_cycle.
    learned_defense:
      trainable: false
      default_defense: c_dog
      reason: yolo11n_lab_v1 keeps learned-defense retraining outside the canonical v1 loop; c_dog evaluation remains manual-only until a trainable YOLO11 path is approved.
  yolo11n_patch_eval_v1:
    description: Imported patch-evaluation profile for canonical patch-defense benchmarking.
    model:
      name: yolo
      params:
        model: yolo11n.pt
    data:
      source_dir: coco/val2017_subset500/images
    predict:
      conf: 0.5
      iou: 0.7
      imgsz: 640
    validation:
      enabled: false
      dataset: configs/coco_subset500.yaml
      params: {}
    summary:
      enabled: false
    runner:
      seed: 42
      max_images: 8
      output_root: outputs/framework_runs
    attacks:
      canonical:
        - pretrained_patch
      manual_only:
        - fgsm
        - pgd
        - deepfool
        - eot_pgd
        - dispersion_reduction
        - blur
        - square
        - cw
        - fgsm_center_mask
        - fgsm_edge_mask
        - jpeg_attack
    defenses:
      canonical:
        - bit_depth
        - jpeg_preprocess
        - median_preprocess
        - c_dog
        - oracle_patch_recover
      manual_only:
        - c_dog_ensemble
        - confidence_filter
        - random_resize
    authoritative_metric: mAP50
    fortify_mode:
      name: imported_patch_eval
      description: Imported patch artifacts are evaluated through standard run-one and patch-matrix workflows outside the gradient-attack auto-cycle.
    learned_defense:
      trainable: false
      default_defense: oracle_patch_recover
      reason: yolo11n_patch_eval_v1 is an evaluation profile for imported patches, not a detector retraining loop.
    plugin_loading:
      allow_extra_canonical: true
