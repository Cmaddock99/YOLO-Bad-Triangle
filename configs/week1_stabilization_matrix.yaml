model:
  path: yolo26n.pt

data:
  data_yaml: configs/coco_subset500.yaml
  image_dir: coco/val2017_subset500/images

runner:
  confs: [0.25]
  iou: 0.7
  imgsz: 640
  seed: 42
  output_root: outputs
  metrics_csv: metrics_summary.csv

experiments:
  - name: baseline_stress
    attack: none
    defense: none
    run_name_template: baseline-stress-confidence{conf_token}
    run_validation: true

  - name: fgsm_epsilon_0040_stress
    attack: fgsm
    attack_params:
      epsilon: 0.004
    defense: none
    run_name_template: fgsm-epsilon-0040-stress-confidence{conf_token}
    run_validation: true

  - name: fgsm_epsilon_0080_stress
    attack: fgsm
    attack_params:
      epsilon: 0.008
    defense: none
    run_name_template: fgsm-epsilon-0080-stress-confidence{conf_token}
    run_validation: true

  - name: fgsm_epsilon_0160_stress
    attack: fgsm
    attack_params:
      epsilon: 0.016
    defense: none
    run_name_template: fgsm-epsilon-0160-stress-confidence{conf_token}
    run_validation: true
