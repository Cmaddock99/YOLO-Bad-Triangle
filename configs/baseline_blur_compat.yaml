model:
  path: yolo11n.pt

data:
  data_yaml: configs/coco_subset500.yaml
  image_dir: coco/val2017_subset500/images

runner:
  confs: [0.25, 0.5, 0.75]
  iou: 0.7
  imgsz: 640
  seed: 42
  output_root: results
  metrics_csv: metrics_summary.csv

experiments:
  - name: baseline
    attack: none
    defense: none
    run_name_template: baseline_conf{conf_token}
    run_validation: true

  - name: blur_attack
    attack: blur
    attack_params:
      kernel_size: 9
    defense: none
    run_name_template: blur_attack_conf{conf_token}

