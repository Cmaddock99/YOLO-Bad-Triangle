model:
  name: yolo
  params:
    model: yolo26n.pt

data:
  source_dir: coco/val2017_subset500/images

attack:
  name: none
  params: {}

defense:
  name: none
  params: {}

predict:
  conf: 0.5  # Framework smoke-test default; not a production threshold (legacy compat default is 0.25 in contracts.py)
  iou: 0.7
  imgsz: 640

validation:
  enabled: false
  dataset: configs/coco_subset500.yaml
  params: {}

parity:
  enabled: false
  legacy_csv_path: outputs/metrics_summary.csv
  fail_on_mismatch: false

summary:
  enabled: false

runner:
  seed: 42
  max_images: 8
  output_root: outputs/framework_runs
  run_name: phase5_baseline_smoke
