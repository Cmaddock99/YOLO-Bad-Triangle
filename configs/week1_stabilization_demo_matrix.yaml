model:
  path: yolov8n.pt

data:
  data_yaml: configs/coco_subset500.yaml
  image_dir: coco/val2017_subset500/images

runner:
  confs: [0.25]
  iou: 0.7
  imgsz: 640
  seed: 42
  output_root: outputs
  metrics_csv: metrics_summary.csv

experiments:
  - name: baseline_control_demo
    attack: none
    defense: none
    run_name_template: baseline-control-demo-confidence{conf_token}
    run_validation: true

  - name: attack_primary_level_0005_demo
    attack: fgsm
    attack_params:
      epsilon: 0.0005
    defense: none
    run_name_template: attack-primary-level-0005-demo-confidence{conf_token}
    run_validation: true

  - name: attack_primary_level_0060_demo
    attack: fgsm
    attack_params:
      epsilon: 0.006
    defense: none
    run_name_template: attack-primary-level-0060-demo-confidence{conf_token}
    run_validation: true

  - name: attack_primary_level_0100_demo
    attack: fgsm
    attack_params:
      epsilon: 0.01
    defense: none
    run_name_template: attack-primary-level-0100-demo-confidence{conf_token}
    run_validation: true
