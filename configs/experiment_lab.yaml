defaults:
  model: yolo26
  dataset: coco_subset
  attack: none
  defense: none

models:
  yolo8:
    path: yolov8n.pt
    label: yolo8
  yolo8n:
    path: yolov8n.pt
    label: yolo8
  yolov8n:
    path: yolov8n.pt
    label: yolo8
  yolo11:
    path: yolo11n.pt
    label: yolo11
  yolo11n:
    path: yolo11n.pt
    label: yolo11
  yolo11s:
    path: yolo11s.pt
    label: yolo11
  yolo26:
    path: yolo26n.pt
    label: yolo26
  yolo26n:
    path: yolo26n.pt
    label: yolo26
  yolo26s:
    path: yolo26s.pt
    label: yolo26

datasets:
  coco_subset:
    data_yaml: configs/coco_subset500.yaml
    image_dir: coco/val2017_subset500/images

runner:
  confs: [0.5]
  iou: 0.7
  imgsz: 640
  seed: 42
  output_root: outputs
  metrics_csv: metrics_summary.csv
  run_validation: false

attacks:
  none:
    module: none
    params: {}
  blur:
    module: blur
    params:
      kernel_size: 9
  gaussian_noise:
    module: gaussian_noise
    params:
      stddev: 12.0
  deepfool:
    module: deepfool
    params:
      epsilon: 0.8
      steps: 3
  fgsm:
    module: fgsm
    params:
      epsilon: 0.01
  pgd:
    module: pgd
    params:
      epsilon: 0.016
      alpha: 0.002
      steps: 20
      random_start: true
      restarts: 1
  eot_pgd:
    module: eot_pgd
    params:
      epsilon: 0.016
      alpha: 0.0015
      steps: 20
      random_start: true
      restarts: 1
      eot_samples: 4
      scale_jitter: 0.1
      translate_frac: 0.03
      brightness_jitter: 0.08
      contrast_jitter: 0.08
      blur_prob: 0.25
  fgsm_center_mask:
    module: fgsm_center_mask
    params:
      epsilon: 0.008
      radius_fraction: 0.35
  fgsm_edge_mask:
    module: fgsm_edge_mask
    params:
      epsilon: 0.008
      edge_threshold: 40
      edge_dilate: 1
  blur_anisotropic:
    module: blur_anisotropic
    params:
      kernel_x: 17
      kernel_y: 3
      sigma_x: 0.0
      sigma_y: 0.0
  noise_blockwise:
    module: noise_blockwise
    params:
      stddev: 10.0
      block_size: 32
      scale_jitter: 0.5
  deepfool_band_limited:
    module: deepfool_band_limited
    params:
      epsilon: 0.9
      steps: 3
      stripe_period: 32
      stripe_width: 12
      blur_kernel: 7
  center_mask_blur_noise:
    module: center_mask_blur_noise
    params:
      center_scale: 0.5
      blur_kernel_size: 9
      noise_stddev: 8.0
      mask_strength: 0.6
  patch_occlusion_affine:
    module: patch_occlusion_affine
    params:
      occlusion_fraction: 0.12
      occlusion_count: 2
      rotation_deg: 6.0
      translate_frac: 0.04
      scale_jitter: 0.06
  brightness_contrast_noise:
    module: brightness_contrast_noise
    params:
      brightness_delta: 18.0
      contrast_gain: 1.15
      noise_stddev: 7.5
      channel_jitter: 0.04

defenses:
  none:
    module: none
    params: {}
  median_blur:
    module: median_blur
    params:
      kernel_size: 3
  denoise:
    module: denoise
    params:
      h: 10.0
      h_color: 10.0
      template_window_size: 7
      search_window_size: 21
