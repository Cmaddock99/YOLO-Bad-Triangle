model:
  path: yolo26n.pt

data:
  data_yaml: configs/coco_subset500.yaml
  image_dir: coco/val2017_subset500/images

runner:
  confs: [0.25]
  iou: 0.7
  imgsz: 640
  seed: 42
  output_root: outputs
  metrics_csv: metrics_summary.csv
  run_validation: false

experiments:
  - name: baseline_tiny_smoke
    attack: none
    defense: none
    run_name_template: baseline-tiny-smoke-conf{conf_token}
    run_validation: false

  - name: pgd_tiny_smoke
    attack: pgd
    attack_params:
      epsilon: 0.008
      alpha: 0.002
      steps: 2
      random_start: true
      restarts: 1
    defense: none
    run_name_template: pgd-tiny-smoke-conf{conf_token}
    run_validation: false

  - name: eot_pgd_tiny_smoke
    attack: eot_pgd
    attack_params:
      epsilon: 0.008
      alpha: 0.002
      steps: 2
      random_start: true
      restarts: 1
      eot_samples: 2
      scale_jitter: 0.05
      translate_frac: 0.02
      brightness_jitter: 0.02
      contrast_jitter: 0.02
      blur_prob: 0.0
    defense: none
    run_name_template: eot-pgd-tiny-smoke-conf{conf_token}
    run_validation: false
