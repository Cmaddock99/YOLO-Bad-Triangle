# Defense evaluation matrix sweep config.
# Run with: python scripts/run_defense_eval_sweep.py
# Generates one run per (model, attack, defense) combination under outputs/defense_eval_matrix/

base_config: configs/default.yaml
output_root: outputs/defense_eval_matrix

matrix:
  models:
    - yolov8n.pt
    - yolo26n.pt
  attacks:
    - none
    - fgsm
    - pgd
  defenses:
    - none
    - c_dog

# Defense-specific params (referenced by name in matrix.defenses)
defense_params:
  c_dog:
    checkpoint_path: "${DPC_UNET_CHECKPOINT_PATH}"
    timestep: 50
    color_order: bgr
    scaling: zero_one
    normalize: true
    device: cpu

# Runner defaults for all matrix runs
runner_overrides:
  validation.enabled: false
  runner.max_images: 0   # 0 = no limit; set to e.g. 50 for fast iteration
