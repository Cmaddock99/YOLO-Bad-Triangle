[tool.pytest.ini_options]
addopts = "-m 'not integration'"
markers = [
    "integration: end-to-end tests that require the full environment (dataset, model weights, GPU/CPU)",
]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"scripts/*" = ["E402"]
"tests/*" = ["E402"]
