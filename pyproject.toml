[tool.pytest.ini_options]
addopts = "-m 'not integration'"
pythonpath = ["src"]
markers = [
    "integration: end-to-end tests that require the full environment (dataset, model weights, GPU/CPU)",
]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"scripts/*" = ["E402"]
"tests/*" = ["E402"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
disable_error_code = ["import-untyped"]
warn_unused_configs = true
pretty = true
files = [
    "src/lab/eval",
    "src/lab/reporting",
    "src/lab/runners",
]
