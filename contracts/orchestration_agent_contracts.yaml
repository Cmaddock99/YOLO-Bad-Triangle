version: v1

severity_schema:
  - CRITICAL
  - MAJOR
  - MINOR

agents:
  builder:
    inputs:
      - audit_report
      - required_systems
    outputs:
      - implementation_summary
      - files_created_or_modified
      - fix_actions
  audit:
    inputs:
      - builder_output
      - parity_config
      - demo_profile
      - output_roots
    outputs:
      - audit_report
      - issues
      - severity_counts
      - parity_status
      - system_health
      - schema_violations
  optimizer:
    inputs:
      - stable_audit_report
      - cleanup_targets
    outputs:
      - refactor_summary
      - cleanup_report

termination_requirements:
  parity_status: PASS
  system_health: PASS
  no_critical_issues: true
  no_schema_violations: true
  demo_runs_successfully: true
